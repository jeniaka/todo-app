<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F8F7F4" id="themeColor">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ─── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="nav-dot"></span>
    <span id="navBrand">My Tasks</span>
  </div>
  <div class="nav-actions">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="he">עב</button>
    </div>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
    <div class="user-pill">
      {{AVATAR}}
      <span class="user-name">{{NAME}}</span>
    </div>
    <form method="post" action="/auth/logout" style="margin:0">
      <button class="nav-logout" id="logoutBtnNav" type="submit">Sign out</button>
    </form>
  </div>
</nav>

<!-- ─── Main ───────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- Hero -->
  <header class="hero">
    <h1 class="hero-title" id="heroTitle">My Tasks</h1>
    <p class="hero-sub" id="heroDate"></p>
  </header>

  <!-- Progress -->
  <div class="progress-card">
    <div class="progress-row">
      <span class="progress-label" id="statsText"></span>
      <span class="progress-pct" id="progPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Add form -->
  <form class="add-bar" id="addForm" autocomplete="off">
    <div class="priority-trigger" id="priorityTrigger" title="Set priority">
      <span class="p-indicator" id="pIndicator"></span>
    </div>
    <input class="add-input" id="addInput" type="text" />
    <button class="add-btn" id="addSubmit" type="submit">Add</button>
  </form>
  <!-- Priority dropdown -->
  <div class="p-dropdown" id="pDropdown" style="display:none">
    <button class="p-opt" data-p="none">   <span class="p-dot" style="background:var(--p-none)"></span> <span data-i18n="none">None</span></button>
    <button class="p-opt" data-p="low">    <span class="p-dot" style="background:var(--p-low)"></span>  <span data-i18n="low">Low</span></button>
    <button class="p-opt" data-p="medium"> <span class="p-dot" style="background:var(--p-med)"></span>  <span data-i18n="medium">Medium</span></button>
    <button class="p-opt" data-p="high">   <span class="p-dot" style="background:var(--p-high)"></span> <span data-i18n="high">High</span></button>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all"    id="fAll">All</button>
    <button class="filter-btn"        data-filter="active" id="fActive">Active</button>
    <button class="filter-btn"        data-filter="done"   id="fDone">Done</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

  <!-- Bottom stats -->
  <div class="stats-row">
    <span id="statsCount"></span>
    <button class="link-btn" id="clearDoneBtn">Clear completed</button>
  </div>

</main>

<!-- ─── Task Detail Modal ──────────────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-handle"></div>

    <!-- Title row -->
    <div class="drawer-title-row">
      <div class="drawer-priority-bar" id="drawerPriorityBar"></div>
      <textarea class="drawer-title" id="drawerTitle" rows="2"></textarea>
      <button class="icon-btn drawer-close" id="drawerClose" aria-label="Close">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Description -->
    <div class="drawer-section">
      <label class="drawer-label" id="descLabel">Notes</label>
      <textarea class="drawer-desc" id="drawerDesc" rows="3"></textarea>
    </div>

    <!-- Priority -->
    <div class="drawer-section">
      <label class="drawer-label" id="priorityLabel">Priority</label>
      <div class="priority-group" id="priorityGroup">
        <button class="p-chip active-none" data-p="none"   id="dp_none">None</button>
        <button class="p-chip" data-p="low"    id="dp_low">Low</button>
        <button class="p-chip" data-p="medium" id="dp_medium">Medium</button>
        <button class="p-chip" data-p="high"   id="dp_high">High</button>
      </div>
    </div>

    <!-- Time info -->
    <div class="drawer-section">
      <label class="drawer-label" id="timeLabel">Time</label>
      <div class="time-info" id="timeInfo"></div>
    </div>

    <!-- Sub-tasks -->
    <div class="drawer-section">
      <div class="subtask-header">
        <label class="drawer-label" id="subtasksLabel">Sub-tasks</label>
        <span class="subtask-count" id="subtaskCount"></span>
      </div>
      <!-- Progress -->
      <div class="sub-progress-wrap" id="subProgressWrap" style="display:none">
        <div class="sub-progress-track">
          <div class="sub-progress-fill" id="subProgressFill"></div>
        </div>
        <span class="sub-progress-label" id="subProgressLabel"></span>
      </div>
      <!-- List -->
      <div class="subtask-list" id="subtaskList"></div>
      <!-- Add subtask -->
      <div class="subtask-add-row">
        <input class="subtask-add-input" id="subtaskInput" type="text" />
        <button class="subtask-add-btn" id="subtaskAddBtn" type="button">+</button>
      </div>
      <!-- AI Split -->
      <button class="ai-split-btn" id="aiSplitBtn" type="button">
        <span class="ai-badge">AI</span> <span id="aiSplitLabel">Split with AI</span>
      </button>
      <!-- AI Suggestions preview -->
      <div class="ai-preview" id="aiPreview" style="display:none">
        <div class="ai-preview-list" id="aiPreviewList"></div>
        <div class="ai-preview-actions">
          <button class="btn-apply" id="aiApplyBtn" type="button">Apply selected</button>
          <button class="btn-cancel-ai" id="aiCancelBtn" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="drawer-actions">
      <button class="btn-delete" id="drawerDeleteBtn" type="button">Delete task</button>
      <button class="btn-save" id="drawerSaveBtn" type="button">Save</button>
    </div>

  </div>
</div>

<!-- ─── AI FAB ────────────────────────────────────────────────────────────── -->
<button class="ai-fab" id="aiFab" aria-label="AI Assistant" aria-expanded="false">
  <span class="ai-fab-icon">✨</span>
</button>

<!-- AI Popover -->
<div class="ai-pop" id="aiPop" aria-hidden="true">
  <div class="ai-pop-header">
    <span class="ai-badge">AI</span>
    <span id="aiPopTitle">AI Assistant</span>
    <button class="icon-btn ai-pop-close" id="aiPopClose">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button class="ai-opt" id="aiSuggestBtn">
    <span class="ai-opt-icon">🎯</span>
    <div>
      <div class="ai-opt-title" id="aiSuggestTitle">Suggest Next Task</div>
      <div class="ai-opt-sub" id="aiSuggestSub">AI picks what to tackle next</div>
    </div>
  </button>
  <button class="ai-opt" id="aiSummaryBtn">
    <span class="ai-opt-icon">📊</span>
    <div>
      <div class="ai-opt-title" id="aiSummaryTitle">Daily Summary</div>
      <div class="ai-opt-sub" id="aiSummarySub">Overview of today's progress</div>
    </div>
  </button>
  <div class="ai-result" id="aiResult" style="display:none"></div>
</div>

<script src="/static/app.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
