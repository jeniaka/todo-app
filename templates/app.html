<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <script>
(function(){
  var l=localStorage.getItem('app_language')||'en';
  document.documentElement.lang=l;
  document.documentElement.dir=(l==='he'||l==='ar')?'rtl':'ltr';
})();
</script>
<style>body{opacity:0;transition:opacity 0.18s ease}body.lang-ready{opacity:1}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAFAF8" id="themeColor">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title id="pageTitle">My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ─── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="nav-dot"></span>
    <span class="nav-title" data-i18n="appTitle">My Tasks</span>
  </div>
  <div class="nav-right">
    <button class="icon-btn chart-btn" id="chartBtn" title="Analytics" aria-label="Analytics">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </button>
    <button class="icon-btn theme-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
      <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <!-- Profile menu -->
    <div class="profile-wrap" id="profileWrap">
      <button class="profile-btn" id="profileBtn" aria-label="Profile menu" aria-expanded="false" aria-haspopup="true">
        {{AVATAR}}
        <span class="profile-menu-indicator">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="currentColor" aria-hidden="true">
            <rect y="0" width="10" height="1.5" rx="0.75"/>
            <rect y="3.25" width="10" height="1.5" rx="0.75"/>
            <rect y="6.5" width="10" height="1.5" rx="0.75"/>
          </svg>
        </span>
      </button>

      <div class="profile-menu" id="profileMenu" aria-hidden="true">
        <!-- Main panel -->
        <div class="menu-panel active" id="menuMain">
          <div class="menu-user">
            <div class="menu-user-name">{{NAME}}</div>
            <div class="menu-user-email">{{EMAIL}}</div>
          </div>
          <div class="menu-divider"></div>
          <button class="menu-item" id="menuLangBtn">
            <span class="menu-item-icon">🌐</span>
            <span data-i18n="languages">Languages</span>
            <svg class="menu-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="menu-item" id="menuNotifBtn">
            <span class="menu-item-icon">🔔</span>
            <span data-i18n="notifications">Notifications</span>
            <svg class="menu-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div class="menu-divider"></div>
          <form method="post" action="/auth/logout" style="margin:0">
            <button class="menu-item menu-logout" type="submit">
              <span class="menu-item-icon">🚪</span>
              <span data-i18n="logout">Sign out</span>
            </button>
          </form>
        </div>

        <!-- Languages panel -->
        <div class="menu-panel" id="menuLang">
          <div class="menu-subheader">
            <button class="menu-back" id="langBackBtn" aria-label="Back">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span data-i18n="languages">Languages</span>
          </div>
          <div class="lang-list" id="langList"></div>
        </div>

        <!-- Notifications panel -->
        <div class="menu-panel" id="menuNotif">
          <div class="menu-subheader">
            <button class="menu-back" id="notifBackBtn" aria-label="Back">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span data-i18n="notifications">Notifications</span>
          </div>
          <div class="notif-list" id="notifList"></div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ─── DB Warning Banner ───────────────────────────────────────────────────── -->
<div class="db-banner" id="dbBanner" style="display:none" role="alert">
  <span>⚠️ MongoDB not connected — tasks are stored locally and <strong>will be deleted on next deploy</strong>.</span>
  <button class="db-banner-close" id="dbBannerClose" aria-label="Dismiss">✕</button>
</div>

<!-- ─── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast" aria-live="polite"></div>

<!-- ─── Main ────────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- Hero (compact) -->
  <header class="hero">
    <h1 class="hero-title" id="heroTitle" data-i18n="appTitle">My Tasks</h1>
    <p class="hero-date" id="heroDate"></p>
  </header>

  <!-- Add form (with auto-open priority dropdown) -->
  <form class="add-wrap" id="addForm" autocomplete="off">
    <div class="add-bar" id="addBar">
      <input class="add-input" id="addInput" type="text" data-i18n-placeholder="addTaskPlaceholder"/>
      <button class="mic-btn" id="micBtn" type="button" aria-label="Voice input" title="Speak to add task">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>
    <!-- Slides down when input is focused -->
    <div class="add-dropdown" id="addDropdown">
      <div class="add-p-row" id="addPRow">
        <button class="add-p-btn active" data-p="low"    type="button" data-i18n="priorityLow">Low</button>
        <button class="add-p-btn"        data-p="medium" type="button" data-i18n="priorityMedium">Medium</button>
        <button class="add-p-btn"        data-p="high"   type="button" data-i18n="priorityHigh">High</button>
      </div>
      <div class="add-dropdown-footer">
        <label class="notify-done-row" id="notifyDoneRow">
          <input type="checkbox" id="notifyDoneCheck" class="notify-done-cb">
          <span data-i18n="notifyOnDone">🔔 Notify when done</span>
        </label>
        <button class="add-btn" id="addSubmit" type="submit" data-i18n="add">Add</button>
      </div>
    </div>
  </form>

  <!-- Filters + mini progress inline -->
  <div class="filter-progress-row">
    <div class="filter-row">
      <button class="filter-btn active" data-filter="all"    id="fAll" data-i18n="filterAll">All</button>
      <button class="filter-btn"        data-filter="active" id="fActive" data-i18n="filterActive">Active</button>
      <button class="filter-btn"        data-filter="done"   id="fDone" data-i18n="filterDone">Done</button>
    </div>
    <div class="progress-mini">
      <div class="progress-track-mini">
        <div class="progress-fill" id="progFill" style="width:0%"></div>
      </div>
      <span class="progress-pct" id="progPct">0%</span>
    </div>
  </div>

  <!-- Hidden elements kept for JS compatibility -->
  <span id="statsText" style="display:none"></span>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

  <!-- Bottom stats -->
  <div class="stats-row">
    <span id="statsCount"></span>
    <button class="link-btn" id="clearDoneBtn" data-i18n="clearCompleted">Clear completed</button>
  </div>

</main>

<!-- ─── Footer ──────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  Designed &amp; built by <strong>Evgeny Keidar</strong>
  <span class="site-footer-dot"></span>
  2026
</footer>

<!-- ─── Charts View ─────────────────────────────────────────────────────────── -->
<div class="charts-overlay" id="chartsView" style="display:none">
  <div class="charts-page">

    <!-- Back button -->
    <div class="charts-header">
      <button class="icon-btn charts-back-btn" id="chartsBackBtn" aria-label="Back to tasks">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 class="charts-title" data-i18n="charts">Analytics</h2>
    </div>

    <!-- Summary stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Chart type selector -->
    <div class="chart-tabs-wrap">
      <div class="chart-tabs" id="chartTabs">
        <button class="chart-tab active" data-chart="pie" data-i18n="chartPie">Pie</button>
        <button class="chart-tab" data-chart="bar" data-i18n="chartBar">By Priority</button>
      </div>
    </div>

    <!-- Chart canvas container -->
    <div class="chart-container" id="chartContainer">
      <canvas id="mainChart"></canvas>
    </div>

    <!-- No data message -->
    <div class="chart-nodata" id="chartNodata" style="display:none">
      <span data-i18n="noData">No data yet</span>
    </div>

  </div>
</div>

<!-- ─── Task Detail Drawer ──────────────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-handle"></div>

    <!-- Title row -->
    <div class="drawer-title-row">
      <div class="drawer-priority-bar" id="drawerPriorityBar"></div>
      <textarea class="drawer-title" id="drawerTitle" rows="2"></textarea>
      <button class="icon-btn drawer-close" id="drawerClose" aria-label="Close">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Description -->
    <div class="drawer-section">
      <label class="drawer-label" id="descLabel" data-i18n="description">Notes</label>
      <textarea class="drawer-desc" id="drawerDesc" rows="3"></textarea>
    </div>

    <!-- Priority -->
    <div class="drawer-section">
      <label class="drawer-label" id="priorityLabel" data-i18n="priority">Priority</label>
      <div class="priority-group" id="priorityGroup">
        <button class="p-chip" data-p="none"   id="dp_none"   data-i18n="priorityNone">None</button>
        <button class="p-chip" data-p="low"    id="dp_low"    data-i18n="priorityLow">Low</button>
        <button class="p-chip" data-p="medium" id="dp_medium" data-i18n="priorityMedium">Medium</button>
        <button class="p-chip" data-p="high"   id="dp_high"   data-i18n="priorityHigh">High</button>
      </div>
    </div>

    <!-- Time info -->
    <div class="drawer-section">
      <label class="drawer-label" id="timeLabel" data-i18n="time">Time</label>
      <div class="time-info" id="timeInfo"></div>
    </div>

    <!-- Sub-tasks -->
    <div class="drawer-section">
      <div class="subtask-header">
        <label class="drawer-label" id="subtasksLabel" data-i18n="subtasks">Sub-tasks</label>
        <span class="subtask-count" id="subtaskCount"></span>
      </div>
      <div class="sub-progress-wrap" id="subProgressWrap" style="display:none">
        <div class="sub-progress-track">
          <div class="sub-progress-fill" id="subProgressFill"></div>
        </div>
        <span class="sub-progress-label" id="subProgressLabel"></span>
      </div>
      <div class="subtask-list" id="subtaskList"></div>
      <div class="subtask-add-row">
        <input class="subtask-add-input" id="subtaskInput" type="text" data-i18n-placeholder="addSubtask"/>
        <button class="mic-btn" id="subMicBtn" type="button" aria-label="Voice input">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="subtask-add-btn" id="subtaskAddBtn" type="button">+</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="drawer-actions">
      <button class="btn-delete" id="drawerDeleteBtn" type="button" data-i18n="deleteTask">Delete task</button>
      <button class="btn-save" id="drawerSaveBtn" type="button" data-i18n="save">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>window.__USER__ = {{USER_JSON}};</script>
<script src="/static/app.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
