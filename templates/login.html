<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <meta name="theme-color" content="#FAFAF8">
  <title>My Tasks — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">

  <div class="login-bg">
    <div class="login-grain"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card" id="loginCard">
      <div class="login-logo-mark">✦</div>
      <h1 class="login-title">My Tasks</h1>
      <p class="login-subtitle" id="loginSubtitle">Simple, beautiful task management.</p>

      <!-- Alert banner (success/error) -->
      <div class="auth-alert" id="authAlert" style="display:none"></div>

      <!-- Google OAuth -->
      <a class="google-btn" href="/auth/google" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span id="googleBtnText">Continue with Google</span>
      </a>

      <!-- Or divider -->
      <div class="auth-divider"><span id="orText">or</span></div>

      <!-- Email/Password form -->
      <form class="auth-form" id="authForm" autocomplete="on" novalidate>

        <!-- Name (register only) -->
        <div class="auth-field" id="nameField" style="display:none">
          <label class="auth-label" for="authName" id="lblName">Full name</label>
          <input class="auth-input" type="text" id="authName" name="name"
            autocomplete="name" placeholder="Jane Smith" maxlength="80"/>
        </div>

        <!-- Email -->
        <div class="auth-field">
          <label class="auth-label" for="authEmail" id="lblEmail">Email address</label>
          <input class="auth-input" type="email" id="authEmail" name="email"
            autocomplete="email" placeholder="you@example.com" maxlength="120"/>
        </div>

        <!-- Password -->
        <div class="auth-field">
          <label class="auth-label" for="authPw" id="lblPw">Password</label>
          <div class="auth-pw-wrap">
            <input class="auth-input" type="password" id="authPw" name="password"
              autocomplete="current-password" placeholder="••••••••" maxlength="128"/>
            <button type="button" class="auth-eye" id="eyeBtn" tabindex="-1" aria-label="Toggle password">
              <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Password strength (register only) -->
        <div class="auth-strength" id="strengthBlock" style="display:none">
          <div class="auth-strength-bar">
            <div class="auth-strength-fill" id="strengthFill"></div>
          </div>
          <span class="auth-strength-label" id="strengthLabel"></span>
          <ul class="auth-pw-reqs" id="pwReqs">
            <li id="req-len">  <span class="req-dot"></span> <span id="reqLenText">At least 8 characters</span></li>
            <li id="req-up">   <span class="req-dot"></span> <span id="reqUpText">Uppercase letter</span></li>
            <li id="req-low">  <span class="req-dot"></span> <span id="reqLowText">Lowercase letter</span></li>
            <li id="req-num">  <span class="req-dot"></span> <span id="reqNumText">Number</span></li>
            <li id="req-sp">   <span class="req-dot"></span> <span id="reqSpText">Special character</span></li>
          </ul>
        </div>

        <!-- Confirm password (register only) -->
        <div class="auth-field" id="confirmField" style="display:none">
          <label class="auth-label" for="authConfirm" id="lblConfirm">Confirm password</label>
          <div class="auth-pw-wrap">
            <input class="auth-input" type="password" id="authConfirm" name="confirm"
              autocomplete="new-password" placeholder="••••••••" maxlength="128"/>
            <button type="button" class="auth-eye" id="eyeBtn2" tabindex="-1" aria-label="Toggle confirm password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="auth-mismatch" id="mismatchMsg" style="display:none"></p>
        </div>

        <!-- Submit -->
        <button type="submit" class="auth-submit" id="authSubmit" disabled>
          <span id="submitText">Sign in</span>
          <span class="auth-spinner" id="authSpinner" style="display:none"></span>
        </button>

      </form>

      <!-- Toggle mode -->
      <p class="auth-toggle-row">
        <span id="toggleHint">Don't have an account?</span>
        <button type="button" class="auth-toggle-btn" id="toggleBtn">Create one</button>
      </p>

      <p class="login-footer" id="loginFooter">Your tasks are private and secure.</p>
    </div>
  </div>

// ── Detect language ───────────────────────────────────────────────────────────
function detectLang(){
  try{
    const s = localStorage.getItem('mytasks_settings');
    if(s){ const d=JSON.parse(s); if(d.language && TL[d.language]) return d.language; }
  }catch(e){}
  const nav = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
  return TL[nav] ? nav : 'en';
}
const lang = detectLang();
const T = TL[lang];
const RTL_LANGS = ['he','ar'];
if(RTL_LANGS.includes(lang)){
  document.documentElement.dir = 'rtl';
  document.documentElement.lang = lang;
}

document.getElementById('lblConfirm').textContent = T.lblConfirm;
document.getElementById('authName').placeholder = T.namePh;
document.getElementById('authEmail').placeholder = T.emailPh;
document.getElementById('reqLenText').textContent = T.reqLen;
document.getElementById('reqUpText').textContent = T.reqUp;
document.getElementById('reqLowText').textContent = T.reqLow;
document.getElementById('reqNumText').textContent = T.reqNum;
document.getElementById('reqSpText').textContent = T.reqSp;
document.getElementById('toggleHint').textContent = T.noAccount;

document.getElementById('loginSubtitle').textContent = T.subtitle;

// ── Mode: login | register | verified ────────────────────────────────────────
let mode = 'login'; // 'login' | 'register'
let pendingEmail = '';

function setMode(m){
  mode = m;
  const isReg = m === 'register';
  document.getElementById('nameField').style.display     = isReg ? '' : 'none';
  document.getElementById('strengthBlock').style.display = isReg ? '' : 'none';
  document.getElementById('confirmField').style.display  = isReg ? '' : 'none';
  document.getElementById('submitText').textContent = isReg ? T.signUpBtn : T.signInBtn;
  document.getElementById('toggleHint').textContent = isReg ? T.haveAccount : T.noAccount;
  document.getElementById('toggleBtn').textContent  = isReg ? T.signInLink  : T.signUpLink;
  document.getElementById('authPw').autocomplete = isReg ? 'new-password' : 'current-password';
  document.getElementById('authAlert').style.display = 'none';
  document.getElementById('mismatchMsg').style.display = 'none';
  updateSubmitState();
}

document.getElementById('toggleBtn').addEventListener('click', () => {
  setMode(mode === 'login' ? 'register' : 'login');
});

// ── Password visibility toggle ────────────────────────────────────────────────
function makeEyeToggle(btnId, inputId){
  document.getElementById(btnId).addEventListener('click', () => {
    const inp = document.getElementById(inputId);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
  });
}
makeEyeToggle('eyeBtn', 'authPw');
makeEyeToggle('eyeBtn2', 'authConfirm');

// ── Password strength ─────────────────────────────────────────────────────────
function checkPwRequirements(pw){
  return {
    len:  pw.length >= 8,
    up:   /[A-Z]/.test(pw),
    low:  /[a-z]/.test(pw),
    num:  /[0-9]/.test(pw),
    sp:   /[^A-Za-z0-9]/.test(pw),
  };
}
function updateStrength(pw){
  const r = checkPwRequirements(pw);
  const met = Object.values(r).filter(Boolean).length;

  const ids = {len:'req-len', up:'req-up', low:'req-low', num:'req-num', sp:'req-sp'};
  Object.entries(r).forEach(([k,v]) => {
    const li = document.getElementById(ids[k]);
    li.classList.toggle('met', v);
  });

  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if(!pw){ fill.className='auth-strength-fill'; fill.style.width='0'; label.textContent=''; return; }
  if(met <= 2){
    fill.className='auth-strength-fill weak'; fill.style.width='33%'; label.textContent=T.weak;
  } else if(met <= 4){
    fill.className='auth-strength-fill medium'; fill.style.width='66%'; label.textContent=T.medium;
  } else {
    fill.className='auth-strength-fill strong'; fill.style.width='100%'; label.textContent=T.strong;
  }
}
document.getElementById('authPw').addEventListener('input', e => {
  if(mode === 'register') updateStrength(e.target.value);
  checkConfirmMatch();
  updateSubmitState();
});

// ── Confirm match check ───────────────────────────────────────────────────────
function checkConfirmMatch(){
  if(mode !== 'register') return true;
  const pw  = document.getElementById('authPw').value;
  const cfm = document.getElementById('authConfirm').value;
  const msg = document.getElementById('mismatchMsg');
  if(cfm && pw !== cfm){
    msg.textContent = T.mismatch;
    msg.style.display = '';
    return false;
  }
  msg.style.display = 'none';
  return true;
}
document.getElementById('authConfirm').addEventListener('input', () => {
  checkConfirmMatch();
  updateSubmitState();
});
document.getElementById('authName').addEventListener('input', updateSubmitState);
document.getElementById('authEmail').addEventListener('input', updateSubmitState);

// ── Submit button enabled state ───────────────────────────────────────────────
function updateSubmitState(){
  const btn   = document.getElementById('authSubmit');
  const email = document.getElementById('authEmail').value.trim();
  const pw    = document.getElementById('authPw').value;
  if(mode === 'login'){
    btn.disabled = !email || !pw;
    return;
  }
  // register
  const name  = document.getElementById('authName').value.trim();
  const cfm   = document.getElementById('authConfirm').value;
  const reqs  = checkPwRequirements(pw);
  const allReqs = Object.values(reqs).every(Boolean);
  btn.disabled = !name || !email || !pw || !allReqs || pw !== cfm;
}

// ── Show alert banner ─────────────────────────────────────────────────────────
function showAlert(html, type){
  const el = document.getElementById('authAlert');
  el.innerHTML = html;
  el.className = 'auth-alert auth-alert-' + type;
  el.style.display = '';
}

// ── Handle URL params (verified / error) ─────────────────────────────────────
(function(){
  const sp = new URLSearchParams(location.search);
  if(sp.get('verified') === '1'){
    showAlert(T.verifiedOk, 'success');
  } else if(sp.get('error')){
    const e = sp.get('error');
    const map = {
      invalid_token: T.invalidToken,
      token_expired: T.tokenExpired,
      db: T.errDb,
    };
    showAlert(map[e] || e, 'error');
  }
  // Clean URL
  if(sp.toString()) history.replaceState(null,'',location.pathname);
})();

// ── Submit handler ────────────────────────────────────────────────────────────
document.getElementById('authForm').addEventListener('submit', async e => {
  e.preventDefault();
  document.getElementById('authAlert').style.display = 'none';

  const email = document.getElementById('authEmail').value.trim().toLowerCase();
  const pw    = document.getElementById('authPw').value;
  const btn   = document.getElementById('authSubmit');
  const spin  = document.getElementById('authSpinner');
  const stxt  = document.getElementById('submitText');

  // Client-side validation
  if(!email || !pw || (mode==='register' && !document.getElementById('authName').value.trim())){
    showAlert(T.errMissing, 'error'); return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showAlert(T.errEmail, 'error'); return;
  }
  if(mode === 'register'){
    const reqs = checkPwRequirements(pw);
    if(!Object.values(reqs).every(Boolean)){ showAlert(T.errWeak, 'error'); return; }
    if(pw !== document.getElementById('authConfirm').value){ showAlert(T.mismatch, 'error'); return; }
  }

  btn.disabled = true;
  spin.style.display = '';
  stxt.style.display = 'none';

  try {
    if(mode === 'register'){
      const name = document.getElementById('authName').value.trim();
      const res = await fetch('/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, email, password: pw}),
      });
      const data = await res.json();
      if(data.error){
        const map = {
          email_taken: T.errTaken,
          invalid_email: T.errEmail,
          weak_password: T.errWeak,
          missing_fields: T.errMissing,
          db_unavailable: T.errDb,
          bcrypt_unavailable: T.errDb,
        };
        showAlert(map[data.error] || data.error, 'error');
        btn.disabled = false;
      } else {
        pendingEmail = email;
        // Show success state — ask user to check email
        showCheckEmail(email, data.emailSent);
      }
    } else {
      const res = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password: pw}),
      });
      const data = await res.json();
      if(data.error){
        const map = {
          invalid_credentials: T.errCreds,
          not_verified: T.errNotVerified,
          missing_fields: T.errMissing,
          db_unavailable: T.errDb,
          bcrypt_unavailable: T.errDb,
        };
        if(data.error === 'not_verified'){
          showNotVerified(email);
        } else {
          showAlert(map[data.error] || data.error, 'error');
          btn.disabled = false;
        }
      } else {
        window.location.href = data.redirect || '/mytasks';
      }
    }
  } catch(err){
    showAlert(T.errDb, 'error');
    btn.disabled = false;
  } finally {
    spin.style.display = 'none';
    stxt.style.display = '';
  }
});

// ── Post-register: check email view ──────────────────────────────────────────
function showCheckEmail(email, emailSent){
  const card = document.getElementById('loginCard');
  card.innerHTML = `
    <div class="auth-check-email">
      <div style="font-size:52px;margin-bottom:16px;">📬</div>
      <h2 class="auth-check-title">${escHtml(T.checkEmail)}</h2>
      <p class="auth-check-addr">${escHtml(email)}</p>
      ${!emailSent ? `<p class="auth-check-note" style="color:var(--text-tertiary);font-size:13px;">(Email delivery unavailable — contact support)</p>` : ''}
      <button type="button" class="auth-resend-btn" id="resendBtn">${escHtml(T.resend)}</button>
      <p style="margin-top:20px;font-size:13px;color:var(--text-tertiary)">
        <a href="/login" style="color:var(--accent);">${escHtml(T.signInLink)}</a>
      </p>
    </div>`;
  document.getElementById('resendBtn').addEventListener('click', async () => {
    const rb = document.getElementById('resendBtn');
    rb.disabled = true;
    await fetch('/api/auth/resend-verification', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    rb.textContent = '✓ Sent';
    setTimeout(() => { rb.disabled = false; rb.textContent = T.resend; }, 30000);
  });
}

// ── Not-verified: show resend option ─────────────────────────────────────────
function showNotVerified(email){
  const btn  = document.getElementById('authSubmit');
  const spin = document.getElementById('authSpinner');
  btn.disabled = false;
  spin.style.display = 'none';
  const resendHtml = `<span>${T.errNotVerified} </span><button type="button" class="auth-alert-link" id="resendAlertBtn">${T.resend}</button>`;
  showAlert(resendHtml, 'warning');
  document.getElementById('resendAlertBtn').addEventListener('click', async () => {
    await fetch('/api/auth/resend-verification', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    showAlert('✓ ' + T.resend, 'success');
  });
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
